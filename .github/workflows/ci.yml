#
# Smoke-test workflow for the GitHub mirror of delta-ota.
# The authoritative pipeline is on GitLab — this workflow only runs
# the cheap checks so that PRs from contributors who only see the
# mirror still get fast feedback.
#
# Windows and macOS native test jobs live here (not on GitLab.com)
# because GitLab's shared runner pool charges for those OSes while
# GitHub Actions provides them free for public projects. They run
# the cross-platform unit tests — notably the `internal/platform`
# tests — which validate symlink/shim behaviour and Windows long-
# path handling on real OSes.

name: ci

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  vendor-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify vendored sources are unmodified
        run: tools/vendor-verify.sh

  go-test:
    name: go test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Vet
        working-directory: client
        run: go vet ./...
      - name: Test
        working-directory: client
        run: go test ./...

  go-cross:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Cross-compile ota-agent ${{ matrix.goos }}/${{ matrix.goarch }}
        working-directory: client
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p ../build/${{ matrix.goos }}-${{ matrix.goarch }}
          go build -trimpath -tags=netgo,osusergo -o ../build/${{ matrix.goos }}-${{ matrix.goarch }}/ota-agent${{ matrix.goos == 'windows' && '.exe' || '' }} ./agent

  libota-cshared:
    name: libota c-shared (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build libota as c-shared
        working-directory: client
        shell: bash
        env:
          CGO_ENABLED: '1'
        run: |
          case "${{ matrix.os }}" in
            ubuntu-*)  ext=so   ;;
            macos-*)   ext=dylib;;
            windows-*) ext=dll  ;;
          esac
          mkdir -p ../build/$RUNNER_OS
          go build -trimpath -buildmode=c-shared -o ../build/$RUNNER_OS/libota.$ext ./cmd/libota-shared
          ls -l ../build/$RUNNER_OS/

  licence-headers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check SPDX headers
        run: tools/check-licence-headers.sh

  # Single-host install tarball (debug / test / evaluation only).
  # Mirrors the `dist-server` job in .gitlab-ci.yml. The artefact is
  # uploaded as a workflow artifact and intentionally NOT attached to
  # the GitHub Release — production deployments use the container
  # image published from GitLab.
  dist-server:
    name: Server tarball (debug/test/eval)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [vendor-verify, licence-headers]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install SBCL + native deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              sbcl libev-dev libssl-dev libbz2-dev \
              sqlite3 libsqlite3-dev libpq-dev \
              build-essential pkg-config
      - name: Install Quicklisp + ota-server deps
        run: |
          curl -fsSL https://beta.quicklisp.org/quicklisp.lisp -o /tmp/quicklisp.lisp
          sbcl --non-interactive --no-userinit --no-sysinit \
               --load /tmp/quicklisp.lisp \
               --eval '(quicklisp-quickstart:install :path "~/quicklisp")' \
               --eval '(quit)'
          sbcl --non-interactive --no-userinit --no-sysinit \
               --load ~/quicklisp/setup.lisp \
               --eval '(ql:quickload (list "alexandria" "uiop" "fiveam" "ironclad" "com.inuoe.jzon" "clop" "sqlite" "clack" "woo" "dexador" "cl-ppcre"))' \
               --eval '(quit)'
      - name: Build server core + vendored helpers
        run: |
          make vendor-build
          make build-server
      - name: Bundle tarball
        run: make dist-server VERSION="${GITHUB_REF_NAME}"
      - name: Upload tarball as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: delta-ota-server-${{ github.ref_name }}
          path: build/dist/delta-ota-server-*.tar.gz
          retention-days: 30
          if-no-files-found: error

  release:
    name: Release on tag
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [vendor-verify, go-test, go-cross]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build all client binaries
        env:
          CGO_ENABLED: '0'
        run: |
          mkdir -p release-bundle
          for os_arch in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64 windows-amd64; do
            os="${os_arch%-*}"; arch="${os_arch##*-}"; ext=""
            [ "$os" = "windows" ] && ext=".exe"
            mkdir -p "client/build/${os_arch}"
            (cd client && GOOS="$os" GOARCH="$arch" go build -trimpath -tags=netgo,osusergo \
                -o "../client/build/${os_arch}/ota-agent${ext}" ./agent)
            case "$os" in
              windows) (cd client/build && zip -j "../../release-bundle/ota-agent-${os_arch}-${GITHUB_REF_NAME}.zip" \
                          "${os_arch}"/*.exe) ;;
              *)       tar -C client/build -czf "release-bundle/ota-agent-${os_arch}-${GITHUB_REF_NAME}.tar.gz" \
                          "${os_arch}/" ;;
            esac
          done
          ls -la release-bundle/
      # The release attaches the ota-agent client binaries only.
      # The single-host server tarball built by `dist-server` above
      # is intentionally NOT attached — production deployments use
      # the container image published from GitLab. See docs/operations.org.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Ogamita Delta OTA ${{ github.ref_name }}"
          body_path: CHANGELOG.md
          files: release-bundle/*
          draft: false
          prerelease: false
