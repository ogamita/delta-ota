#
# Smoke-test workflow for the GitHub mirror of delta-ota.
# The authoritative pipeline is on GitLab — this workflow only runs
# the cheap checks so that PRs from contributors who only see the
# mirror still get fast feedback.
#
# Windows and macOS native test jobs live here (not on GitLab.com)
# because GitLab's shared runner pool charges for those OSes while
# GitHub Actions provides them free for public projects. They run
# the cross-platform unit tests — notably the `internal/platform`
# tests — which validate symlink/shim behaviour and Windows long-
# path handling on real OSes.

name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  vendor-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify vendored sources are unmodified
        run: tools/vendor-verify.sh

  go-test:
    name: go test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Vet
        working-directory: client
        run: go vet ./...
      - name: Test
        working-directory: client
        run: go test ./...

  go-cross:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Cross-compile ota-agent ${{ matrix.goos }}/${{ matrix.goarch }}
        working-directory: client
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p ../build/${{ matrix.goos }}-${{ matrix.goarch }}
          go build -trimpath -tags=netgo,osusergo -o ../build/${{ matrix.goos }}-${{ matrix.goarch }}/ota-agent${{ matrix.goos == 'windows' && '.exe' || '' }} ./agent

  libota-cshared:
    name: libota c-shared (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build libota as c-shared
        working-directory: client
        shell: bash
        env:
          CGO_ENABLED: '1'
        run: |
          case "${{ matrix.os }}" in
            ubuntu-*)  ext=so   ;;
            macos-*)   ext=dylib;;
            windows-*) ext=dll  ;;
          esac
          mkdir -p ../build/$RUNNER_OS
          go build -trimpath -buildmode=c-shared -o ../build/$RUNNER_OS/libota.$ext ./cmd/libota-shared
          ls -l ../build/$RUNNER_OS/

  licence-headers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check SPDX headers
        run: tools/check-licence-headers.sh
