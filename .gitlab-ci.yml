#
# Authoritative pipeline for delta-ota.
# Hosted on gitlab.com/ogamita/delta-ota; mirrored to GitHub.
#
# Design notes:
# - Cheap verify jobs (vendor-verify, licence-headers, go vet/test, Go
#   cross-compile) run on stock public images (alpine, golang:alpine).
#   They do NOT depend on the custom dev image — so first-push pipelines
#   on a fresh repo are not blocked by the chicken-and-egg.
# - The dev image is only required by jobs that genuinely need SBCL+Go
#   together (the SBCL server build, the e2e harness once it lands).
#   Those jobs declare `needs: [build-dev-image]`.
# - On the default branch (master), the dev image is rebuilt on every
#   push so it always exists for downstream jobs. On feature branches
#   it is only rebuilt when docker/Dockerfile.dev or .gitlab-ci.yml
#   change; otherwise the cached image from the registry is reused.

include:
  - template: Security/SAST.gitlab-ci.yml

variables:
  DEV_IMAGE: "$CI_REGISTRY_IMAGE/dev:latest"
  SERVER_IMAGE: "$CI_REGISTRY_IMAGE/server:$CI_COMMIT_SHORT_SHA"
  CGO_ENABLED: "0"
  GOFLAGS: "-trimpath -tags=netgo,osusergo"
  GO_IMAGE: "golang:1.22-alpine"

stages:
  - prepare
  - verify
  - build
  - test
  - package
  - publish

# ---------- prepare ----------
# Multi-arch dev image (linux/amd64 + linux/arm64) so it pulls cleanly
# on x86_64 cloud runners and on the Apple-silicon developer
# workstation.
build-dev-image:
  stage: prepare
  image: docker:26
  services:
    - docker:26-dind
  variables:
    PLATFORMS: "linux/amd64,linux/arm64"
  before_script:
    - apk add --no-cache git
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    # Register QEMU for cross-arch emulation, then create a buildx builder.
    - docker run --privileged --rm tonistiigi/binfmt --install all
    - docker buildx create --name otabuilder --use
    - docker buildx inspect --bootstrap
  script:
    # Cache backend = registry, ref = a sibling 'dev:cache' tag.
    # `inline` (the prior choice) is silently a no-op on multi-
    # platform manifests; only single-platform exporters write
    # cache metadata into the image manifest itself.  With the
    # registry backend + mode=max, every intermediate layer's
    # blob is pushed to the cache ref so the next pipeline can
    # actually skip the apt-get + go-tarball + quicklisp stages.
    - docker buildx build
        --platform "$PLATFORMS"
        --cache-from "type=registry,ref=$CI_REGISTRY_IMAGE/dev:cache"
        --cache-to   "type=registry,ref=$CI_REGISTRY_IMAGE/dev:cache,mode=max"
        --tag "$DEV_IMAGE"
        --file docker/Dockerfile.dev
        --push
        .
  rules:
    # Always rebuild on the default branch so the image is fresh and
    # downstream jobs can pull it.
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
    # On other branches, only rebuild if the recipe itself changed.
    - changes:
        - docker/Dockerfile.dev
        - .gitlab-ci.yml

# ---------- verify (cheap, stock images, no dev-image dependency) ----------
# `needs: []` opts these jobs into DAG mode so they run immediately
# and are NOT blocked by a failure in the `prepare` stage.
vendor-verify:
  stage: verify
  image: alpine:3.20
  needs: []
  before_script:
    - apk add --no-cache git coreutils findutils
  script:
    - tools/vendor-verify.sh

licence-headers:
  stage: verify
  image: alpine:3.20
  needs: []
  before_script:
    - apk add --no-cache git
  script:
    - tools/check-licence-headers.sh

go-vet:
  stage: verify
  image: $GO_IMAGE
  needs: []
  before_script:
    - apk add --no-cache git
  script:
    - cd client && go vet ./...

go-test:
  stage: verify
  image: $GO_IMAGE
  needs: []
  before_script:
    - apk add --no-cache git
  script:
    - cd client && go test ./...

go-fuzz:
  stage: verify
  image: $GO_IMAGE
  needs: []
  before_script:
    - apk add --no-cache git make
  script:
    # 6 fuzz targets × 5 s = ~30 s wall-clock; long enough to catch
    # silly crashes, short enough that the pipeline stays brisk.
    - FUZZTIME=5s make fuzz

# ---------- build ----------
# Server build needs SBCL: only this job depends on the dev image.
build-server:
  stage: build
  image: $DEV_IMAGE
  needs:
    - job: build-dev-image
      optional: true
  rules:
    # Only attempt the server build when the dev image is available
    # — i.e. on the default branch, on tags, or on branches that
    # touched the Dockerfile/CI itself.
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
    - changes:
        - docker/Dockerfile.dev
        - .gitlab-ci.yml
        - server/**/*
        - vendor/**/*
        - tools/vendor-build/**/*
        - Makefile
  script:
    - make vendor-build build-server
  artifacts:
    paths:
      - server/build/
    expire_in: 1 week

# Client cross-compiles do not need the dev image — pure Go.
# `needs: []` keeps them independent of the prepare stage.
.go-cross: &go-cross
  stage: build
  image: $GO_IMAGE
  needs: []
  before_script:
    - apk add --no-cache git make

build-client-linux:
  <<: *go-cross
  script:
    - mkdir -p client/build/linux-amd64 client/build/linux-arm64
    - (cd client && GOOS=linux GOARCH=amd64 go build $GOFLAGS -o ../client/build/linux-amd64/ota-agent       ./agent)
    - (cd client && GOOS=linux GOARCH=arm64 go build $GOFLAGS -o ../client/build/linux-arm64/ota-agent       ./agent)
  artifacts:
    paths:
      - client/build/linux-*/
    expire_in: 1 week

build-client-darwin:
  <<: *go-cross
  script:
    - mkdir -p client/build/darwin-amd64 client/build/darwin-arm64
    - (cd client && GOOS=darwin GOARCH=amd64 go build $GOFLAGS -o ../client/build/darwin-amd64/ota-agent     ./agent)
    - (cd client && GOOS=darwin GOARCH=arm64 go build $GOFLAGS -o ../client/build/darwin-arm64/ota-agent     ./agent)
  artifacts:
    paths:
      - client/build/darwin-*/
    expire_in: 1 week

build-client-windows:
  <<: *go-cross
  script:
    - mkdir -p client/build/windows-amd64
    - (cd client && GOOS=windows GOARCH=amd64 go build $GOFLAGS -o ../client/build/windows-amd64/ota-agent.exe ./agent)
  artifacts:
    paths:
      - client/build/windows-*/
    expire_in: 1 week

# libota as c-shared / c-archive needs cgo + a C toolchain. Only
# build it for linux-amd64 from the cross-compile pipeline; the
# darwin and windows variants need their native SDKs and live in
# the per-OS test jobs below.
build-libota-linux:
  stage: build
  image: golang:1.22-bookworm
  needs: []
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git ca-certificates build-essential
  script:
    - mkdir -p client/build/linux-amd64
    - (cd client && CGO_ENABLED=1 go build -trimpath -buildmode=c-shared -o ../client/build/linux-amd64/libota.so ./cmd/libota-shared)
    - (cd client && CGO_ENABLED=1 go build -trimpath -buildmode=c-archive -o ../client/build/linux-amd64/libota.a ./cmd/libota-shared)
  artifacts:
    paths:
      - client/build/linux-amd64/libota.*
    expire_in: 1 week

# ---------- test ----------
self-contained-check:
  stage: test
  image: alpine:3.20
  needs:
    - job: build-client-linux
      artifacts: true
  before_script:
    - apk add --no-cache file
  script:
    - tools/check-self-contained.sh client/build/linux-amd64/ota-agent
    - tools/check-self-contained.sh client/build/linux-arm64/ota-agent

e2e:
  stage: test
  image: $DEV_IMAGE
  needs:
    - job: build-dev-image
      optional: true
  before_script:
    # Quicklisp lives at /opt/quicklisp in the dev image; the e2e
    # script's run-server.lisp expects ~/quicklisp/setup.lisp, so
    # provide a symlink for compatibility.
    - mkdir -p $HOME && [ -e $HOME/quicklisp ] || ln -s /opt/quicklisp $HOME/quicklisp
  script:
    - tests/e2e/run.sh
    - tests/e2e/auth.sh
    - tests/e2e/ops.sh
    - tests/e2e/recovery.sh
    - tests/e2e/parallel.sh
    - tests/e2e/two-process-publish.sh
    - tests/e2e/resume-download.sh
    - tests/e2e/admin-identity.sh
    - tests/e2e/client-state.sh
    - tests/e2e/stats.sh
  artifacts:
    when: always
    paths:
      - tests/e2e/run/logs/
      - tests/e2e/run-auth/logs/
      - tests/e2e/run-ops/logs/
      - tests/e2e/run-recovery/logs/
      - tests/e2e/run-parallel/logs/
      - tests/e2e/run-two-process/logs/
      - tests/e2e/run-resume/logs/
      - tests/e2e/run-admin-identity/logs/
      - tests/e2e/run-client-state/logs/
      - tests/e2e/run-stats/logs/
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
    - when: manual
      allow_failure: true

# ---------- package ----------
# Bundle the client binaries into per-OS tarballs that the GitLab
# Release attaches as downloadable assets.
release-bundle:
  stage: package
  image: alpine:3.20
  needs:
    - job: build-client-linux
      artifacts: true
    - job: build-client-darwin
      artifacts: true
    - job: build-client-windows
      artifacts: true
    - job: build-libota-linux
      artifacts: true
  before_script:
    - apk add --no-cache tar gzip zip
  script:
    - mkdir -p release-bundle
    - for d in client/build/*/; do
        os_arch=$(basename "$d");
        case "$os_arch" in
          windows-*) zip -j "release-bundle/ota-agent-${os_arch}-${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}.zip" "$d"/*.exe LICENSE README.md CHANGELOG.md ;;
          *)         tar -C client/build -czf "release-bundle/ota-agent-${os_arch}-${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}.tar.gz" "$os_arch"/ ;;
        esac;
      done
    - ls -la release-bundle/
  artifacts:
    paths:
      - release-bundle/
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_TAG'

# Single-host install tarball (debug / test / evaluation only).
# Bundles the SBCL core, vendored helpers, sample config, systemd
# unit, and entrypoint wrapper into delta-ota-server-${VERSION}.tar.gz.
# This artefact is intentionally NOT attached to the GitLab Release
# (production deployments use the container image below).
dist-server:
  stage: package
  image: $DEV_IMAGE
  needs:
    - job: build-dev-image
      optional: true
    - job: build-server
      artifacts: true
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git tar gzip || true
  script:
    - make vendor-build
    - make dist-server VERSION="${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}"
    - ls -la build/dist/
  artifacts:
    paths:
      - build/dist/delta-ota-server-*.tar.gz
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

build-server-image:
  stage: package
  image: docker:26
  services:
    - docker:26-dind
  needs:
    - job: build-server
      artifacts: true
  variables:
    PLATFORMS: "linux/amd64,linux/arm64"
  before_script:
    - apk add --no-cache git
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker run --privileged --rm tonistiigi/binfmt --install all
    - docker buildx create --name otabuilder --use
    - docker buildx inspect --bootstrap
  script:
    - docker buildx build
        --platform "$PLATFORMS"
        --build-arg VERSION="${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}"
        --build-arg VCS_REF="${CI_COMMIT_SHA}"
        --tag "$SERVER_IMAGE"
        --tag "$CI_REGISTRY_IMAGE/server:latest"
        --file docker/Dockerfile.server
        --push
        .
  # v1.1.1: gated on tags only.  Operators pull versioned image
  # tags for production (registry.../server:vX.Y.Z); the rolling
  # `:latest` was being rebuilt on every master push too,
  # doubling the QEMU-emulated arm64 buildx burn (~10 min per
  # pipeline) for no operational benefit.  The most recent tag's
  # build still updates `:latest`, so anyone who really wants
  # "the latest tagged release" still gets it.
  rules:
    - if: '$CI_COMMIT_TAG'

# ---------- publish ----------
release:
  stage: publish
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: release-bundle
      artifacts: true
    - build-server-image
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - echo "Releasing ${CI_COMMIT_TAG}"
    - ls -la release-bundle/
  release:
    name: "Ogamita Delta OTA ${CI_COMMIT_TAG}"
    tag_name: "$CI_COMMIT_TAG"
    description: |
      See [CHANGELOG.md](CHANGELOG.md) for the changes in ${CI_COMMIT_TAG}.

      ## Container image (canonical for the server)
      - `registry.gitlab.com/ogamita/delta-ota/server:${CI_COMMIT_TAG}` (linux/amd64 + linux/arm64)

      The single-host install tarball produced by the `dist-server`
      job is **not** attached as a release asset — it is for
      debugging, test, and evaluation only. Pull it from the
      pipeline artefacts of this tag if you need it.

      ## Documentation
      - [Datasheet](docs/delta-ota-datasheet.org)
      - [User manual](docs/delta-ota-user-manual.org)
      - [Operator runbook](docs/operations.org)

      ## Licensing
      Dual: AGPL-3.0-or-later for open-source distribution; commercial
      licences from Ogamita Ltd. (sales@ogamita.com).
    assets:
      links:
        - name: "ota-agent linux-amd64"
          url:  "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/release-bundle/ota-agent-linux-amd64-${CI_COMMIT_TAG}.tar.gz"
        - name: "ota-agent linux-arm64"
          url:  "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/release-bundle/ota-agent-linux-arm64-${CI_COMMIT_TAG}.tar.gz"
        - name: "ota-agent darwin-amd64"
          url:  "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/release-bundle/ota-agent-darwin-amd64-${CI_COMMIT_TAG}.tar.gz"
        - name: "ota-agent darwin-arm64"
          url:  "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/release-bundle/ota-agent-darwin-arm64-${CI_COMMIT_TAG}.tar.gz"
        - name: "ota-agent windows-amd64"
          url:  "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/release-bundle/ota-agent-windows-amd64-${CI_COMMIT_TAG}.zip"
