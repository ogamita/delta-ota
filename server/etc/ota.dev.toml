# Local-development configuration. Used by `make run-server`.

[server]
listen     = "127.0.0.1:8443"
hostname   = "localhost"
data_dir   = "build/dev/ota-data"
log_level  = "debug"
# Number of Woo worker threads.  Each runs its own libev loop and
# shares the listening socket; a slow handler on one worker does
# not block requests on the others.
worker_num = 4

# Local dev only.  In production set OTA_ADMIN_TOKEN in the env
# instead -- env-var wins over this value.
admin_token = "dev-token"

[tls]
require_mtls = false

[storage]
backend = "fs"

[catalogue]
db = "sqlite:build/dev/ota-data/db/ota.db"

[patcher]
default      = "bsdiff"
worker_count = 1
bsdiff_path  = "server/build/bin/bsdiff"
bspatch_path = "server/build/bin/bspatch"
# xdelta3 is intentionally not configured: see docs/adr/0004-bsdiff-only-no-xdelta3.org

[gc]
default_threshold = 0

[install_token]
ttl_seconds = 900
